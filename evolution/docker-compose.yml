services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks: [n8n_net]                 # same network → reachable as host "redis" by evolution-api / n8n
    command: ["redis-server", "--requirepass", "redispass123", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    networks: [n8n_net]                 # joins the existing n8n network → reaches Postgres/redis/n8n by name
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./instances:/evolution/instances
    ports:
      - "127.0.0.1:8080:8080"           # local-only (manager UI + debugging); in-network access is http://evolution-api:8080

volumes:
  redis_data:

networks:
  n8n_net:
    external: true
    name: n8n_net                       # actual network from `docker network ls`
